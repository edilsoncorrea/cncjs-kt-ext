<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CNCjs Auto-Level Widget</title>
  <link rel="stylesheet" href="css/widget.css">
</head>
<body>
  <header class="header">
    <h1>CNCjs Auto-Level Widget</h1>
    <div class="connection-indicator" id="connection-indicator">
      <span class="status-dot" id="status-dot"></span>
      <span id="connection-text">Disconnected</span>
    </div>
  </header>

  <div class="app-layout">
    <!-- Top row: Canvas + Parameters side panel -->
    <div class="top-row">
      <!-- Heatmap Canvas -->
      <section class="heatmap-section">
        <div class="view-toggle">
          <button id="btn-view-2d" class="btn btn-small">2D</button>
          <button id="btn-view-3d" class="btn btn-small active">3D</button>
          <label class="z-exaggeration">
            Z ×<input type="number" id="z-exaggeration" value="5" min="1" max="1000" step="1">
          </label>
        </div>
        <canvas id="heatmap-canvas" width="700" height="420"></canvas>
        <div class="tooltip" id="tooltip" style="display:none;"></div>
      </section>

      <!-- Parameters Panel (right side) -->
      <aside class="params-panel">
        <section class="panel-section">
          <h2>Parameters</h2>
          <form id="params-form" autocomplete="off">
            <div class="form-row">
              <label for="param-delta">Delta</label>
              <input type="number" id="param-delta" name="delta" value="10" step="0.5" min="0.1">
              <span class="unit">mm</span>
              <span class="error-msg" id="error-delta"></span>
            </div>
            <div class="form-row">
              <label for="param-height">Height</label>
              <input type="number" id="param-height" name="height" value="2" step="0.5" min="0.1">
              <span class="unit">mm</span>
              <span class="error-msg" id="error-height"></span>
            </div>
            <div class="form-row">
              <label for="param-feed">Feed ↓</label>
              <input type="number" id="param-feed" name="feed" value="50" step="10" min="1">
              <span class="unit">mm/min</span>
              <span class="error-msg" id="error-feed"></span>
            </div>
            <div class="form-row">
              <label for="param-feedz">Feed Z↑</label>
              <input type="number" id="param-feedz" name="feedZ" value="" step="10" min="1" placeholder="=Feed">
              <span class="unit">mm/min</span>
              <span class="error-msg" id="error-feedZ"></span>
            </div>
            <div class="form-row">
              <label for="param-feedxy">Feed XY</label>
              <input type="number" id="param-feedxy" name="feedXY" value="" step="10" min="1" placeholder="=Feed">
              <span class="unit">mm/min</span>
              <span class="error-msg" id="error-feedXY"></span>
            </div>
            <div class="form-row">
              <label for="param-margin">Margin</label>
              <input type="number" id="param-margin" name="margin" value="2.5" step="0.5" min="0">
              <span class="unit">mm</span>
              <span class="error-msg" id="error-margin"></span>
            </div>
            <div class="form-row">
              <label for="param-nprobes">N Probes</label>
              <input type="number" id="param-nprobes" name="nProbes" value="1" step="1" min="1" max="10">
              <span class="unit"></span>
              <span class="error-msg" id="error-nProbes"></span>
            </div>
            <div class="form-row">
              <label for="param-xsize">X Size</label>
              <input type="number" id="param-xsize" name="xSize" step="1" min="0" placeholder="auto">
              <span class="unit">mm</span>
              <span class="error-msg" id="error-xSize"></span>
            </div>
            <div class="form-row">
              <label for="param-ysize">Y Size</label>
              <input type="number" id="param-ysize" name="ySize" step="1" min="0" placeholder="auto">
              <span class="unit">mm</span>
              <span class="error-msg" id="error-ySize"></span>
            </div>
            <div class="form-row checkbox-row">
              <label>
                <input type="checkbox" id="param-probeonly" name="probeOnly">
                Probe Only
              </label>
            </div>
          </form>
          <div class="grid-info" id="grid-info">
            <span id="grid-points">Points: --</span>
            <span id="grid-time">Est: --</span>
          </div>
        </section>
      </aside>
    </div>

    <!-- Bottom row: Controls + Statistics + Progress + Files -->
    <div class="bottom-row">
      <!-- Controls -->
      <section class="panel-section bottom-panel">
        <h2>Controls</h2>
        <div class="button-group">
          <button id="btn-start" class="btn btn-primary">Start Probing</button>
          <button id="btn-simulate" class="btn btn-secondary">Simulate</button>
          <button id="btn-stop" class="btn btn-danger" disabled>Stop</button>
          <button id="btn-reapply" class="btn btn-secondary">Re-apply</button>
        </div>
      </section>

      <!-- Progress -->
      <section class="panel-section bottom-panel" id="progress-section">
        <h2>Progress</h2>
        <div class="progress-bar-container">
          <div class="progress-bar" id="progress-bar"></div>
        </div>
        <span class="progress-text" id="progress-text">0 / 0</span>
      </section>

      <!-- Statistics -->
      <section class="panel-section bottom-panel">
        <h2>Statistics</h2>
        <div class="stats-inline" id="stats-panel">
          <span>Min:<b id="stat-minz">--</b></span>
          <span>Max:<b id="stat-maxz">--</b></span>
          <span>Avg:<b id="stat-avgz">--</b></span>
          <span>σ:<b id="stat-stddev">--</b></span>
          <span>Amp:<b id="stat-amplitude">--</b></span>
          <span>Pts:<b id="stat-count">--</b></span>
        </div>
      </section>

      <!-- Files -->
      <section class="panel-section bottom-panel">
        <h2>Files</h2>
        <div class="file-inline">
          <input type="text" id="file-name-input" placeholder="filename.txt">
          <button id="btn-save" class="btn btn-small">Save</button>
          <button id="btn-load-list" class="btn btn-small btn-secondary">Load</button>
        </div>
        <ul class="file-list" id="file-list"></ul>
      </section>
    </div>
  </div>

  <div class="toast" id="toast" style="display:none;"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="js/validation.js"></script>
  <script src="js/stats.js"></script>
  <script src="js/grid-calculator.js"></script>
  <script src="js/heatmap.js"></script>
  <script src="js/socket-client.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
